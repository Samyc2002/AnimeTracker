[build]
  command = "echo '--- npm install ---' && npm install --legacy-peer-deps && echo '--- npm run build ---' && npm run build || (echo '--- BUILD FAILED ---' && exit 1)"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  CI = "false"

[[plugins]]
  package = "@netlify/plugin-nextjs"
