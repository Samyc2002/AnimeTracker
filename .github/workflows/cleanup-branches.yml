name: Cleanup merged branches

on:
  schedule:
    - cron: '17 3 * * 1' # Every Monday at 3:17 AM UTC
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete merged branches
        uses: actions/github-script@v7
        with:
          script: |
            const protectedBranches = new Set(['main']);

            const { data: branches } = await github.rest.repos.listBranches({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            let deleted = 0;
            for (const branch of branches) {
              if (protectedBranches.has(branch.name)) continue;

              try {
                const { data: comparison } = await github.rest.repos.compareCommits({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  base: 'main',
                  head: branch.name,
                });

                if (comparison.status === 'behind' || comparison.status === 'identical') {
                  await github.rest.git.deleteRef({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: `heads/${branch.name}`,
                  });
                  core.info(`Deleted merged branch: ${branch.name}`);
                  deleted++;
                }
              } catch (err) {
                core.warning(`Skipped ${branch.name}: ${err.message}`);
              }
            }

            core.info(`Deleted ${deleted} merged branch(es)`);
